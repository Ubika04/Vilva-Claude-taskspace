version: '3.8'

services:

  # ── Nginx ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: vilva_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - php
    networks:
      - vilva_net

  # ── PHP-FPM (Laravel) ─────────────────────────────────────────────
  php:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: vilva_php
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
    environment:
      - APP_ENV=production
    depends_on:
      - mysql
      - redis
    networks:
      - vilva_net

  # ── MySQL ──────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: vilva_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf:ro
    ports:
      - "3306:3306"
    networks:
      - vilva_net
    command: --default-authentication-plugin=mysql_native_password

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vilva_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - vilva_net

  # ── Queue Worker (Horizon) ─────────────────────────────────────────
  horizon:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: vilva_horizon
    working_dir: /var/www/html
    command: php artisan horizon
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - vilva_net

  # ── Scheduler ─────────────────────────────────────────────────────
  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: vilva_scheduler
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --verbose; sleep 60; done"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - vilva_net

  # ── Frontend (Vite Dev Server) ─────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: vilva_frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    networks:
      - vilva_net

volumes:
  mysql_data:
  redis_data:

networks:
  vilva_net:
    driver: bridge
