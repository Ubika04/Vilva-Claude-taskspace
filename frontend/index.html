<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Vilva Taskspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/assets/css/styles.css"/>
  <script>
    // Apply color theme early to prevent flash
    (function(){
      localStorage.removeItem('vilva_ui_theme'); // cleanup old
      var t = localStorage.getItem('vilva_theme') || '';
      var m = localStorage.getItem('vilva_mode') || '';
      if (t) document.documentElement.className += ' theme-' + t;
      if (m === 'dark') document.documentElement.className += ' dark';
    })();
  </script>
</head>
<body>
<div id="app">

  <!-- ── AUTH ──────────────────────────────────────────────────── -->
  <div id="auth-view" class="auth-view hidden">
    <div class="auth-card">
      <div class="auth-logo">
        <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
          <rect width="30" height="30" rx="9" fill="#6366f1"/>
          <path d="M8 15l5.5 5.5L22 9" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Vilva Taskspace
      </div>
      <div id="auth-form-slot"></div>
    </div>
  </div>

  <!-- ── MAIN APP — Shell rendered by layouts.js ─────────────────── -->
  <div id="main-view" class="main-view hidden"></div>

  <!-- Notifications panel -->
  <div class="notif-panel hidden" id="notif-panel">
    <div class="notif-head">
      <h3>Notifications</h3>
      <button class="btn-link btn btn-sm" id="mark-all-read-btn">Mark all read</button>
    </div>
    <div class="notif-list-wrap" id="notif-list"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal-box" id="modal-box">
      <div class="modal-head" id="modal-head"></div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-foot hidden" id="modal-foot"></div>
    </div>
  </div>

  <!-- Task Side Panel -->
  <div class="side-panel-overlay hidden" id="side-panel-overlay">
    <div class="side-panel" id="side-panel">
      <div class="side-panel-header" id="side-panel-header"></div>
      <div class="side-panel-body" id="side-panel-body"></div>
    </div>
  </div>

  <!-- Toasts -->
  <div class="toast-container" id="toast-container"></div>
</div>

<script type="module" src="/src/js/main.js"></script>
</body>
</html>
